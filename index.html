<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name — Personal Page</title>

    <!-- ========== Font Awesome 图标库（CDN 引入） ========== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ============================================================
                            CSS 变量 & 全局重置
        ============================================================ */
        :root {
            --bg: #f7f5f3;
            --card-bg: #ffffff;
            --text-primary: #1e1e1e;
            --text-secondary: #5c5c5c;
            --text-muted: #999999;
            --pill-bg: #f0efed;
            --pill-hover-bg: #e6e4e1;
            --accent-subtle: #b8a99a;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.06);
            --radius: 18px;
            --radius-sm: 10px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-stack);
            /* 微妙的暖灰渐变背景，几乎不可察觉，但比纯色更有层次 */
            background:
                radial-gradient(ellipse at 25% 15%, rgba(190, 175, 160, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 72% 58%, rgba(170, 180, 190, 0.05) 0%, transparent 50%),
                linear-gradient(175deg, #f7f5f3 0%, #f3f1ee 40%, #f6f4f2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ============================================================
                            卡片容器
        ============================================================ */
        .card {
            position: relative;
            background: var(--card-bg);
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 52px 50px 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm), var(--shadow-md), var(--shadow-lg);
            /* 入场动画初始状态 */
            opacity: 0;
            transform: translateY(22px);
            animation: fadeInUp 0.7s ease-out forwards;
            animation-delay: 0.05s;
        }

        /* 卡片顶部的微秒装饰线 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 3px;
            border-radius: 0 0 3px 3px;
            background: linear-gradient(90deg, #c5b6a6, #d4c8b9, #c5b6a6);
            opacity: 0.7;
        }

        /* ============================================================
                            入场动画关键帧
        ============================================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 各元素依次淡入 */
        .card .name {
            opacity: 0;
            transform: translateY(16px);
            animation: fadeInUp 0.6s ease-out forwards;
            animation-delay: 0.15s;
        }

        .card .tagline {
            opacity: 0;
            transform: translateY(14px);
            animation: fadeInUp 0.6s ease-out forwards;
            animation-delay: 0.28s;
        }

        .card .links-row {
            opacity: 0;
            transform: translateY(14px);
            animation: fadeInUp 0.6s ease-out forwards;
            animation-delay: 0.42s;
        }

        .card .footer-note {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.55s ease-out forwards;
            animation-delay: 0.56s;
        }

        /* ============================================================
                            姓名
            ★ 修改姓名：直接替换下方 HTML 中 .name 内的文字
        ============================================================ */
        .name {
            font-size: 2.3rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 6px;
            line-height: 1.25;
        }

        /* ============================================================
                            一句话自我介绍
            ★ 修改自我介绍：替换下方 HTML 中 .tagline 内的文字
        ============================================================ */
        .tagline {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 34px;
            letter-spacing: 0.01em;
        }

        /* ============================================================
                            链接区域（三个 Pill 按钮）
            ★ 修改链接地址：替换下方 HTML 中各 <a> 的 href 属性
            ★ 修改链接文字：替换各 <a> 内 <span> 中的文字
            ★ 修改图标：替换各 <i> 的 class（fa-github / fa-envelope / fa-feather-alt）
        ============================================================ */
        .links-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            align-items: center;
            margin-bottom: 38px;
        }

        /* 单个 Pill 链接 */
        .pill-link {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 11px 20px;
            background: var(--pill-bg);
            border-radius: 50px;
            /* 胶囊形状 */
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.98rem;
            font-weight: 480;
            letter-spacing: 0.01em;
            transition:
                background var(--transition-fast),
                transform var(--transition-fast),
                box-shadow var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            white-space: nowrap;
        }

        .pill-link i {
            font-size: 1.05rem;
            color: #4a4a4a;
            transition: color var(--transition-fast);
            /* 图标不参与文字选择 */
            pointer-events: none;
        }

        .pill-link:hover {
            background: var(--pill-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.07);
        }

        .pill-link:hover i {
            color: #1e1e1e;
        }

        .pill-link:active {
            transform: translateY(0);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            transition: transform 0.08s ease, box-shadow 0.08s ease;
        }

        /* 键盘焦点样式 */
        .pill-link:focus-visible {
            outline: 2px solid #a09080;
            outline-offset: 3px;
            border-radius: 50px;
        }

        /* ============================================================
                            页脚
            ★ 修改页脚文字：替换下方 HTML 中 .footer-note 内的文字
        ============================================================ */
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            padding-top: 18px;
            border-top: 1px solid #ecebe9;
            margin-top: 6px;
        }

        /* ============================================================
                            响应式设计 — 移动端适配
        ============================================================ */
        @media (max-width: 560px) {
            body {
                padding: 16px 12px;
                align-items: flex-start;
                /* 小屏幕卡片靠上，避免被地址栏遮挡 */
                padding-top: 40px;
            }

            .card {
                padding: 38px 24px 30px;
                border-radius: var(--radius-sm);
                box-shadow: var(--shadow-sm), var(--shadow-md);
                /* 移动端减弱阴影 */
            }

            .card::before {
                width: 52px;
                height: 2.5px;
            }

            .name {
                font-size: 1.75rem;
            }

            .tagline {
                font-size: 1rem;
                margin-bottom: 28px;
            }

            .links-row {
                gap: 10px;
                margin-bottom: 30px;
            }

            .pill-link {
                padding: 10px 16px;
                font-size: 0.9rem;
                gap: 7px;
                border-radius: 50px;
            }

            .pill-link i {
                font-size: 0.95rem;
            }

            .footer-note {
                font-size: 0.75rem;
                padding-top: 14px;
            }
        }

        /* 超小屏幕（如 iPhone SE）进一步优化 */
        @media (max-width: 380px) {
            .card {
                padding: 30px 18px 24px;
                border-radius: 12px;
            }

            .name {
                font-size: 1.55rem;
            }

            .tagline {
                font-size: 0.92rem;
                margin-bottom: 24px;
            }

            .links-row {
                gap: 8px;
                flex-direction: column;
                /* 链接纵向堆叠 */
                align-items: stretch;
            }

            .pill-link {
                justify-content: center;
                padding: 12px 14px;
                font-size: 0.88rem;
            }

            .footer-note {
                font-size: 0.72rem;
            }
        }

        /* ============================================================
                            尊重用户"减少动画"偏好
        ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            .card,
            .card .name,
            .card .tagline,
            .card .links-row,
            .card .footer-note {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .pill-link {
                transition: none;
            }

            html {
                scroll-behavior: auto;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
                        卡片主体
        所有可自定义的内容都在这个 .card 容器内
    ============================================================ -->
    <div class="card">

        <!--
            ★★★ 修改姓名：替换下方文字 "Your Name" 为你的真实姓名 ★★★
        -->
        <h1 class="name">车靖楠</h1>

        <!--
            ★★★ 修改自我介绍：替换下方文字为你自己的描述 ★★★
        -->
        <p class="tagline">保持好奇，踏实做事，在热爱的领域稳步成长。</p>

        <!--
            ★★★ 链接区域 ★★★
            每个 <a> 标签代表一个链接，包含图标 <i> + 文字 <span>
            - 修改链接地址：替换 href 属性的值
            - 修改图标：替换 <i> 的 class（保持 fa-fw 不变，改图标名即可）
            - 修改文字：替换 <span> 中的内容
        -->
        <div class="links-row">

            <!-- GitHub 链接 -->
            <!-- ★ 修改 href="https://github.com/yourusername" 为你的 GitHub 地址 -->
            <a href="https://github.com/8CJN" class="pill-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github fa-fw" aria-hidden="true"></i>
                <!-- ★ 修改下方文字 -->
                <span>GitHub</span>
            </a>

            <!-- Email 链接 -->
            <!-- ★ 修改 href="mailto:you@example.com" 为你的邮箱地址 -->
            <a href="chejingnan@outlook.com" class="pill-link" aria-label="Email">
                <i class="fa-solid fa-envelope fa-fw" aria-hidden="true"></i>
                <!-- ★ 修改下方文字 -->
                <span>Email</span>
            </a>

            <!-- Blog 链接 -->
            <!-- ★ 修改 href="#" 为你的博客地址；若暂无博客，保持 # 即可 -->
            <a href="#" class="pill-link" target="_blank" rel="noopener noreferrer" aria-label="Blog">
                <i class="fa-solid fa-feather-alt fa-fw" aria-hidden="true"></i>
                <!-- ★ 修改下方文字 -->
                <span>Blog</span>
            </a>

        </div>

        <!--
            ★★★ 页脚小字 ★★★
            如需修改，替换下方文字即可
        -->
        <p class="footer-note">若再许我少年时，一两黄金一两风.</p>

    </div>

</body>
</html>
